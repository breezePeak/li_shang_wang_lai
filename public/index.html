<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼尚往来 · 流程驾驶舱</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="page-noise"></div>
  <div class="page-orb orb-a"></div>
  <div class="page-orb orb-b"></div>

  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><i class="fa-solid fa-water"></i></div>
        <div>
          <h1>礼尚往来</h1>
          <p>River Timeline Cockpit</p>
        </div>
      </div>
      <div class="topbar-meta">
        <div class="meta-chip">
          <span class="meta-dot"></span>
          <span>SQLite WAL</span>
        </div>
        <button class="refresh-btn" id="btn-refresh">
          <i class="fa-solid fa-rotate-right"></i>
          <span>刷新</span>
        </button>
      </div>
    </header>

    <section class="hero-panel">
      <div class="hero-copy">
        <span class="eyebrow">从左到右，一条河就是整个礼尚往来流程</span>
        <h2>点击每个节点，看这一阶段正在发生什么，以及哪里需要你介入。</h2>
        <p>主河道负责推进“采集、生成、审核、执行、完成”，分支河道专门暴露风险、失败回退和暂缓提醒。</p>
      </div>
      <div class="hero-stats" id="hero-stats">
        <div class="hero-stat-card">
          <span>入库通知</span>
          <strong id="hero-collected-total">0</strong>
        </div>
        <div class="hero-stat-card">
          <span>回访任务</span>
          <strong id="hero-total-tasks">0</strong>
        </div>
        <div class="hero-stat-card">
          <span>已完成</span>
          <strong id="hero-completed-tasks">0</strong>
        </div>
      </div>
    </section>

    <section class="river-board">
      <div class="river-header">
        <div>
          <span class="section-kicker">流程河流</span>
          <h3>礼尚往来时间线</h3>
        </div>
        <div class="river-legend">
          <span><i class="fa-solid fa-circle"></i> 主河道</span>
          <span><i class="fa-solid fa-code-branch"></i> 提醒分支</span>
        </div>
      </div>

      <div class="river-scroll">
        <div class="river-stage-strip" id="river-stage-strip"></div>
      </div>
    </section>

    <section class="detail-panel">
      <div class="detail-summary">
        <div class="detail-heading">
          <span class="section-kicker" id="detail-kicker">阶段详情</span>
          <h3 id="detail-title">加载中</h3>
          <p id="detail-description">正在读取这一阶段的任务上下文。</p>
        </div>
        <div class="detail-metrics" id="detail-metrics"></div>
      </div>

      <div class="detail-branches">
        <div class="detail-branches-head">
          <h4>提醒与分支</h4>
          <span id="detail-branch-count">0</span>
        </div>
        <div class="branch-list" id="detail-branches"></div>
      </div>

      <div class="detail-workspace">
        <div class="workspace-toolbar">
          <div class="workspace-status">
            <h4 id="workspace-title">当前阶段任务</h4>
            <p id="workspace-subtitle">按所选流程节点自动切换内容。</p>
          </div>
          <div class="workspace-actions" id="workspace-actions">
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" placeholder="搜索用户、作品、评论...">
            </div>
            <div class="select-wrap">
              <select id="filter-status">
                <option value="all">所有状态</option>
                <option value="pending">处理中</option>
                <option value="ready">待执行</option>
                <option value="failed">失败</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="filter-relation">
                <option value="all">所有来源</option>
                <option value="follow">互关</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" id="btn-view-grid"><i class="fa-solid fa-grip"></i></button>
              <button class="view-btn" id="btn-view-table"><i class="fa-solid fa-table-list"></i></button>
            </div>
          </div>
        </div>

        <div class="workspace-body" id="workspace-body"></div>
      </div>
    </section>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <div class="bulk-floating-bar" id="bulk-action-bar">
    <div class="bulk-bar-content">
      <div class="bulk-info">
        <span class="bulk-icon"><i class="fa-solid fa-list-check"></i></span>
        <span class="bulk-count">已选中 <strong id="selected-count">0</strong> 项</span>
      </div>
      <div class="bulk-actions">
        <button class="btn btn-primary" id="btn-bulk-approve">
          <i class="fa-solid fa-circle-check"></i> 批量批准
        </button>
        <button class="btn btn-danger" id="btn-bulk-skip">
          <i class="fa-solid fa-circle-xmark"></i> 批量跳过
        </button>
        <button class="btn btn-secondary" id="btn-bulk-cancel">取消选择</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
