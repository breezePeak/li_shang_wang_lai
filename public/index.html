<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼尚往来 · 创作者回访控制驾驶舱</title>
  <link rel="stylesheet" href="index.css">
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- 背景动效立体光晕 -->
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>
  <div class="bg-glow glow-3"></div>
  <div class="bg-glow glow-4"></div>

  <div class="app-container">
    <!-- Header 头部 -->
    <header class="app-header">
      <div class="header-logo">
        <div class="logo-icon"><i class="fa-solid fa-gift"></i></div>
        <div class="logo-text">
          <h1>礼尚往来</h1>
          <p>DOUYIN CREATOR COCKPIT</p>
        </div>
      </div>
      <div class="header-status">
        <span class="status-indicator online"></span>
        <span class="status-label">SQLite WAL 驱动已就绪</span>
      </div>
    </header>

    <!-- Stats Timeline Flow 统计流光时间线 -->
    <section class="timeline-container" id="timeline-flow-board">
      <div class="collection-snapshot" aria-label="通知采集统计">
        <span class="collection-kicker">采集第一站</span>
        <div class="collection-total">
          <span id="stat-collected-total">0</span>
          <small>条入库</small>
        </div>
        <div class="collection-breakdown">
          <span><i class="fa-solid fa-heart"></i><strong id="stat-collected-likes">0</strong>赞</span>
          <span><i class="fa-solid fa-comment-dots"></i><strong id="stat-collected-comments">0</strong>评</span>
        </div>
      </div>
      <div class="timeline-track-wrapper">
        <!-- 缓缓流动的发光光纤粒子线 -->
        <div class="timeline-flow-line"></div>
        
        <div class="timeline-nodes-flow">
          <!-- 节点 1 (上悬挂) -->
          <div class="timeline-node" id="node-1">
            <div class="node-dot"><i class="fa-solid fa-database"></i></div>
            <div class="timeline-placard placard-up">
              <span class="placard-name">累计回访用户</span>
              <span class="placard-value" id="stat-total-tasks">0</span>
            </div>
          </div>

          <!-- 节点 2 (下悬挂) -->
          <div class="timeline-node" id="node-2">
            <div class="node-dot"><i class="fa-solid fa-heart"></i></div>
            <div class="timeline-placard placard-down">
              <span class="placard-name">待回访作品</span>
              <span class="placard-value" id="stat-pending-likes">0</span>
            </div>
          </div>

          <!-- 节点 3 (上悬挂) -->
          <div class="timeline-node" id="node-3">
            <div class="node-dot"><i class="fa-solid fa-comment-dots"></i></div>
            <div class="timeline-placard placard-up">
              <span class="placard-name">待审核评论</span>
              <span class="placard-value" id="stat-pending-comments">0</span>
            </div>
          </div>

          <!-- 节点 4 (下悬挂) -->
          <div class="timeline-node" id="node-4">
            <div class="node-dot"><i class="fa-solid fa-reply-all"></i></div>
            <div class="timeline-placard placard-down">
              <span class="placard-name">暂缓回复评论</span>
              <span class="placard-value" id="stat-pending-replies">0</span>
            </div>
          </div>

          <!-- 节点 5 (上悬挂) -->
          <div class="timeline-node" id="node-5">
            <div class="node-dot"><i class="fa-solid fa-circle-check"></i></div>
            <div class="timeline-placard placard-up">
              <span class="placard-name">成功互访达成</span>
              <span class="placard-value" id="stat-completed-tasks">0</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Tabs Navigation 选项卡 -->
    <nav class="nav-tabs">
      <button class="tab-btn active" data-tab="tab-review">
        <i class="fa-solid fa-shield-halved"></i> 回访大厅 · 现场审核
      </button>
      <button class="tab-btn" data-tab="tab-pending">
        <i class="fa-solid fa-circle-pause"></i> 暂缓回复评论队列
      </button>
    </nav>

    <!-- Tab Contents 内容区 -->
    <main class="main-content">
      <!-- 选项卡 1：回访审核 -->
      <div id="tab-review" class="tab-pane active">
        <div class="pane-header">
          <h2>回访任务列表 <span class="badge" id="review-count">0</span></h2>
          <p class="pane-subtitle">在此处审核由 AI 基于好友作品上下文生成的互动回复草稿，审核通过后该任务将进入下一轮物理加固执行队列。</p>
        </div>

        <!-- 过滤器和视图切换器 -->
        <div class="control-panel">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="搜索用户昵称、作品标题、评论候选...">
          </div>
          <div class="filters-group">
            <div class="select-wrapper">
              <i class="fa-solid fa-filter"></i>
              <select id="filter-status">
                <option value="all">所有状态</option>
                <option value="pending">准备中</option>
                <option value="ready">等待执行</option>
                <option value="failed">执行失败</option>
              </select>
            </div>
            <div class="select-wrapper">
              <i class="fa-solid fa-user-group"></i>
              <select id="filter-relation">
                <option value="all">所有关系</option>
                <option value="follow">互关</option>
                <option value="other">粉丝/朋友</option>
              </select>
            </div>
          </div>
          <div class="view-switcher">
            <button class="view-btn active" id="btn-view-grid" title="卡片网格视图">
              <i class="fa-solid fa-grip"></i> 网格卡片
            </button>
            <button class="view-btn" id="btn-view-table" title="紧凑表格视图">
              <i class="fa-solid fa-table-list"></i> 紧凑表格
            </button>
          </div>
        </div>

        <!-- 通用渲染容器 (表格与网格均在内部渲染) -->
        <div id="review-container" class="view-grid">
          <!-- 动态加载内容 -->
          <div class="empty-state">
            <i class="fa-solid fa-circle-check"></i>
            <p>目前没有待审核的回访任务，全部运转正常！</p>
          </div>
        </div>
      </div>

      <!-- 选项卡 2：暂缓回复 -->
      <div id="tab-pending" class="tab-pane">
        <div class="pane-header">
          <h2>暂未回复评论展示区 <span class="badge badge-replies" id="pending-count">0</span></h2>
          <p class="pane-subtitle">这里是系统已扫描入库、但按照规则自动暂缓且需要人工确认是否回复的评论。批准后才会加入回复队列。</p>
        </div>
        <div class="pending-list" id="pending-comment-list">
          <!-- 动态加载挂起评论 -->
          <div class="empty-state">
            <i class="fa-solid fa-face-smile-beam"></i>
            <p>没有暂缓回复的好友评论。</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Notification Toast 全局提示 -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Floating Bulk Action Bar 悬浮批量操作栏 -->
  <div class="bulk-floating-bar" id="bulk-action-bar">
    <div class="bulk-bar-content">
      <div class="bulk-info">
        <span class="bulk-icon"><i class="fa-solid fa-list-check"></i></span>
        <span class="bulk-count">已选中 <strong id="selected-count">0</strong> 项任务</span>
      </div>
      <div class="bulk-actions">
        <button class="btn btn-primary" id="btn-bulk-approve">
          <i class="fa-solid fa-circle-check"></i> 批量批准通过
        </button>
        <button class="btn btn-danger" id="btn-bulk-skip">
          <i class="fa-solid fa-circle-xmark"></i> 批量跳过所选
        </button>
        <button class="btn btn-secondary" id="btn-bulk-cancel">
          取消选择
        </button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
