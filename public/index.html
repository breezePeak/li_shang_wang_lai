<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼尚往来 · 流程驾驶舱</title>
  <link rel="stylesheet" href="index.css">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="page-noise"></div>
  <div class="page-orb orb-a"></div>
  <div class="page-orb orb-b"></div>

  <div class="app-shell">
    <section class="river-board" onclick="closeDetailCabin();">
      <!-- 融入式顶栏：左侧品牌，右侧悬浮毛玻璃数据卡与刷新 -->
      <div class="river-header-full" onclick="event.stopPropagation();">
        <div class="river-brand">
          <div class="river-brand-mark"><i class="fa-solid fa-water"></i></div>
          <div class="river-brand-text">
            <h1>礼尚往来</h1>
            <p>RIVER TIMELINE COCKPIT</p>
          </div>
        </div>

        <div class="river-meta-container">
          <div class="meta-frosted-chip">
            <span class="chip-dot"></span>
            <span>SQLite WAL</span>
          </div>
          <div class="meta-frosted-chip">
            <span class="chip-label">入库通知</span>
            <strong class="chip-value" id="hero-collected-total">0</strong>
          </div>
          <div class="meta-frosted-chip">
            <span class="chip-label">回访任务</span>
            <strong class="chip-value" id="hero-total-tasks">0</strong>
          </div>
          <div class="meta-frosted-chip">
            <span class="chip-label">已完成</span>
            <strong class="chip-value" id="hero-completed-tasks">0</strong>
          </div>
          <button class="frosted-refresh-btn" id="btn-refresh">
            <i class="fa-solid fa-rotate-right"></i>
            <span>刷新</span>
          </button>
        </div>
      </div>

      <div class="river-scroll" onclick="event.stopPropagation();">
        <div class="river-stage-strip" id="river-stage-strip">
          <!-- SVG 渐变波浪河流（拓宽至 1400x320，起伏大，水流更加波澜壮阔） -->
          <svg class="river-svg" viewBox="0 0 1400 320" preserveAspectRatio="none">
            <defs>
              <linearGradient id="river-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#1f6d78" stop-opacity="0.85" />
                <stop offset="25%" stop-color="#2f8f73" stop-opacity="0.85" />
                <stop offset="50%" stop-color="#a3b899" stop-opacity="0.9" />
                <stop offset="75%" stop-color="#d39b34" stop-opacity="0.9" />
                <stop offset="100%" stop-color="#cc782a" stop-opacity="0.88" />
              </linearGradient>
            </defs>
            <!-- 底色主干河道 -->
            <path d="M 0,190 C 150,190 280,70 450,70 C 620,70 650,210 750,210 C 850,210 950,160 1050,160 C 1150,160 1200,120 1300,120 L 1400,120" 
                  fill="none" stroke="url(#river-gradient)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" class="river-base-path" />
            <!-- 柔和中宽流光 -->
            <path d="M 0,190 C 150,190 280,70 450,70 C 620,70 650,210 750,210 C 850,210 950,160 1050,160 C 1150,160 1200,120 1300,120 L 1400,120" 
                  fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" class="river-flow-path-1" />
            <!-- 高亮细流星流光 -->
            <path d="M 0,190 C 150,190 280,70 450,70 C 620,70 650,210 750,210 C 850,210 950,160 1050,160 C 1150,160 1200,120 1300,120 L 1400,120" 
                  fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="river-flow-path-2" />
          </svg>
          
          <!-- 时间线圆形主节点与挂载分支容器 -->
          <div class="river-nodes-container" id="river-nodes-container"></div>
        </div>
      </div>
    </section>

    <!-- 空间三维磨砂悬浮详情舱 -->
    <div class="floating-detail-cabin" id="detail-cabin" onclick="event.stopPropagation();">
      <!-- 指向节点的发光三角形箭头 -->
      <div class="cabin-arrow"></div>
      
      <!-- 关闭按钮 -->
      <button class="cabin-close-btn" onclick="closeDetailCabin();">
        <i class="fa-solid fa-xmark"></i>
      </button>

      <!-- 第一栏：概要与指标 -->
      <div class="cabin-column cabin-summary">
        <div class="detail-heading">
          <span class="detail-kicker" id="detail-kicker">STAGE</span>
          <h3 id="detail-title">阶段加载中...</h3>
          <p id="detail-description" style="display:none;"></p>
        </div>
        <div class="detail-metrics" id="detail-metrics">
          <!-- JS 动态填充 metrics -->
        </div>
      </div>

      <!-- 第二栏：告警分支 -->
      <div class="cabin-column cabin-branches-wrap">
        <div class="detail-branches-head">
          <h4>涉及分支</h4>
          <span id="detail-branch-count">0</span>
        </div>
        <div class="detail-branches" id="detail-branches">
          <!-- JS 动态填充 branches -->
        </div>
      </div>

      <!-- 第三栏：处理工作区 -->
      <div class="cabin-column cabin-workspace">
        <div class="workspace-toolbar" style="display: none !important;">
          <div class="workspace-status">
            <h4 id="workspace-title">当前阶段任务</h4>
            <p id="workspace-subtitle">按所选流程节点自动切换内容。</p>
          </div>
          <div class="workspace-actions" id="workspace-actions">
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" placeholder="搜索用户、作品、评论...">
            </div>
            <div class="select-wrap">
              <select id="filter-status">
                <option value="all">所有状态</option>
                <option value="pending">处理中</option>
                <option value="ready">待执行</option>
                <option value="failed">失败</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="filter-relation">
                <option value="all">所有来源</option>
                <option value="follow">互关</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" id="btn-view-grid"><i class="fa-solid fa-grip"></i></button>
              <button class="view-btn" id="btn-view-table"><i class="fa-solid fa-table-list"></i></button>
            </div>
          </div>
        </div>

        <div class="workspace-body" id="workspace-body"></div>
      </div>
    </div>
    </section>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <div class="bulk-floating-bar" id="bulk-action-bar">
    <div class="bulk-bar-content">
      <div class="bulk-info">
        <span class="bulk-icon"><i class="fa-solid fa-list-check"></i></span>
        <span class="bulk-count">已选中 <strong id="selected-count">0</strong> 项</span>
      </div>
      <div class="bulk-actions">
        <button class="btn btn-primary" id="btn-bulk-approve">
          <i class="fa-solid fa-circle-check"></i> 批量批准
        </button>
        <button class="btn btn-danger" id="btn-bulk-skip">
          <i class="fa-solid fa-circle-xmark"></i> 批量跳过
        </button>
        <button class="btn btn-secondary" id="btn-bulk-cancel">取消选择</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
