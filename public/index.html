<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>礼尚往来 · 流程驾驶舱</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="page-noise"></div>
  <div class="page-orb orb-a"></div>
  <div class="page-orb orb-b"></div>
  <div class="page-fireworks" aria-hidden="true">
    <span class="bg-firework bg-firework-a"><i></i></span>
    <span class="bg-firework bg-firework-b"><i></i></span>
    <span class="bg-firework bg-firework-c"><i></i></span>
  </div>

  <header class="app-header">
    <div class="river-brand">
      <div class="river-brand-mark"><i class="fa-solid fa-timeline"></i></div>
      <div class="river-brand-text">
        <h1>礼尚往来</h1>
        <p>PARALLEL TIMELINE COCKPIT</p>
      </div>
    </div>

    <div class="river-meta-container">
      <div class="meta-frosted-chip">
        <span class="chip-dot"></span>
        <span>SQLite WAL</span>
      </div>
      <div class="meta-frosted-chip">
        <span class="chip-label">入库</span>
        <strong class="chip-value" id="hero-collected-total">0</strong>
      </div>
      <div class="meta-frosted-chip">
        <span class="chip-label">待处理</span>
        <strong class="chip-value" id="hero-total-tasks">0</strong>
      </div>
      <div class="meta-frosted-chip">
        <span class="chip-label">异常</span>
        <strong class="chip-value" id="hero-completed-tasks">0</strong>
      </div>
      <button class="frosted-refresh-btn" id="btn-refresh">
        <i class="fa-solid fa-rotate-right"></i>
        <span>刷新</span>
      </button>
    </div>
  </header>

  <div class="app-shell">
    <section class="river-board">
      <div class="river-scroll">
        <div class="river-stage-strip" id="river-stage-strip">
          <!-- 并列时间线：回评和回访同级展示 -->
          <div class="river-nodes-container" id="river-nodes-container"></div>
        </div>
      </div>
    </section>

    <!-- 下方常驻阶段驾驶台 -->
    <main class="stage-dashboard" id="detail-cabin">
      <div class="cabin-column cabin-summary summary-card">
        <div class="detail-heading">
          <span class="detail-kicker" id="detail-kicker">STAGE</span>
          <h3 id="detail-title">阶段加载中...</h3>
          <p id="detail-description"></p>
        </div>
        <div class="detail-metrics" id="detail-metrics">
          <!-- JS 动态填充 metrics -->
        </div>
        <div class="detail-categories-head">
          <h4><i class="fa-solid fa-layer-group"></i> 流程统计</h4>
        </div>
        <div class="detail-categories" id="detail-categories">
          <!-- JS 动态填充流程分类统计 -->
        </div>
      </div>

      <div class="cabin-column cabin-workspace detail-card">
        <div class="workspace-toolbar">
          <div class="workspace-status">
            <h4 id="workspace-title">当前阶段任务</h4>
            <p id="workspace-subtitle">按所选流程节点自动切换内容。</p>
          </div>
          <div class="workspace-actions" id="workspace-actions">
            <div class="search-box">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="text" id="search-input" placeholder="搜索用户、作品、评论...">
            </div>
            <div class="select-wrap">
              <select id="filter-status">
                <option value="all">所有状态</option>
                <option value="pending">处理中</option>
                <option value="ready">待执行</option>
                <option value="failed">失败</option>
              </select>
            </div>
            <div class="select-wrap">
              <select id="filter-relation">
                <option value="all">所有来源</option>
                <option value="follow">互关</option>
                <option value="other">其他</option>
              </select>
            </div>
            <div class="view-toggle">
              <button class="view-btn active" id="btn-view-grid"><i class="fa-solid fa-grip"></i></button>
              <button class="view-btn" id="btn-view-table"><i class="fa-solid fa-table-list"></i></button>
            </div>
          </div>
        </div>

        <div class="workspace-body" id="workspace-body"></div>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <div class="bulk-floating-bar" id="bulk-action-bar">
    <div class="bulk-bar-content">
      <div class="bulk-info">
        <span class="bulk-icon"><i class="fa-solid fa-list-check"></i></span>
        <span class="bulk-count">已选中 <strong id="selected-count">0</strong> 项</span>
      </div>
      <div class="bulk-actions">
          <button class="btn btn-primary" id="btn-bulk-approve">
            <i class="fa-solid fa-circle-check"></i> 批量保存待执行
        </button>
        <button class="btn btn-danger" id="btn-bulk-skip">
          <i class="fa-solid fa-circle-xmark"></i> 批量跳过
        </button>
        <button class="btn btn-secondary" id="btn-bulk-cancel">取消选择</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
